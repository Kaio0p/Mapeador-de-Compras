name: Keep Streamlit Awake

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        # O parâmetro -A envia um User-Agent falso, fingindo ser o Google Chrome no Windows
        run: curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" -sL "https://mapeador-de-compras.streamlit.app" > /dev/null
